name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  minimal-imports:
    name: Minimal imports (Python 3.13)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install minimal test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run clean-import smoke tests without wire extras
        run: |
          python -m unittest \
            tests.unit.test_optional_bson_imports \
            tests.unit.test_module_imports \
            tests.unit.test_public_exports

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.13"
          - "3.14"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,wire]

      - name: Run unit and integration tests
        run: python -m unittest discover -s tests -p 'test*.py'

      - name: Build distributions
        run: python -m build --sdist --wheel

      - name: Regenerate compat snapshots
        run: python scripts/update_compat_snapshots.py

      - name: Verify compat snapshots are committed
        run: git diff --exit-code -- tests/fixtures/compat_catalog_snapshot.json tests/fixtures/compat_catalog_snapshot.md

      - name: Smoke installed wheel
        if: matrix.python-version == '3.14'
        run: python scripts/smoke_installed_wheel.py

      - name: Smoke installed sdist
        if: matrix.python-version == '3.14'
        run: python scripts/smoke_installed_wheel.py --sdist
